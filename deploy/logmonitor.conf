# LogMonitor Nginx Configuration
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Upstream for the collector API
upstream logmonitor_api {
    server 127.0.0.1:9200;
    keepalive 32;
}

# Upstream for the dashboard dev server (development)
# upstream logmonitor_dashboard_dev {
#     server 127.0.0.1:9201;
# }

server {
    listen 80;
    server_name logs.example.com;  # Change to your domain

    # Optional: Basic Auth
    # auth_basic "LogMonitor";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Dashboard static files (production)
    location / {
        root /opt/logmonitor/dashboard/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Collector API
    location /api/ {
        proxy_pass http://logmonitor_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffers
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Rate limiting (optional)
        limit_req zone=api_limit burst=20 nodelay;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://logmonitor_api/api/health;
        access_log off;
    }

    # Logging
    access_log /var/log/nginx/logmonitor_access.log;
    error_log /var/log/nginx/logmonitor_error.log;
}

# Rate limit zone (add to http block in nginx.conf)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
