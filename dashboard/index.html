<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogMonitor Dashboard</title>
  <meta name="description" content="Lightweight self-hosted frontend log monitoring system">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23409EFF'><path d='M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5L19 8v8l-7 3.5L5 16V8l7-3.5zM11 7h2v6h-2V7zm0 8h2v2h-2v-2z'/></svg>">

  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.7/dist/index.css">
  <!-- Element Plus Dark Mode CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.7/dist/index-dark.css">

  <style>
    :root {
      --el-color-primary: #409EFF;
      --sidebar-width: 220px;
      --header-height: 60px;
      /* Light mode colors */
      --bg-color: #f5f7fa;
      --card-bg: #ffffff;
      --text-primary: #303133;
      --text-secondary: #606266;
      --border-color: #e4e7ed;
      --sidebar-bg: #304156;
      --sidebar-text: #bfcbd9;
      --header-bg: #ffffff;
    }

    html.dark {
      /* Dark mode colors */
      --bg-color: #1a1a1a;
      --card-bg: #242424;
      --text-primary: #e5e5e5;
      --text-secondary: #a0a0a0;
      --border-color: #363636;
      --sidebar-bg: #1f1f1f;
      --sidebar-text: #b0b0b0;
      --header-bg: #242424;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-color);
      color: var(--text-primary);
      transition: background-color 0.3s, color 0.3s;
    }

    #app {
      min-height: 100vh;
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-box {
      width: 400px;
      padding: 40px;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .login-title {
      text-align: center;
      margin-bottom: 30px;
      color: var(--text-primary);
      font-size: 24px;
    }

    .dashboard-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      transition: width 0.3s, background-color 0.3s;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
    }

    .sidebar-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 18px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--el-color-primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-menu {
      padding: 20px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.2s;
      color: var(--sidebar-text);
      text-decoration: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    .nav-item.active {
      background: var(--el-color-primary);
      color: #fff;
    }

    .nav-item-icon {
      width: 18px;
      height: 18px;
      margin-right: 12px;
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      display: flex;
      flex-direction: column;
    }

    .top-header {
      height: var(--header-height);
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 99;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .theme-toggle {
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background-color 0.2s;
    }

    .theme-toggle:hover {
      background-color: rgba(0,0,0,0.05);
    }

    html.dark .theme-toggle:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--el-color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .content-area {
      padding: 20px;
      flex: 1;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: background-color 0.3s;
    }

    .stat-title {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .stat-trend {
      font-size: 12px;
      margin-top: 8px;
    }

    .trend-up { color: #67c23a; }
    .trend-down { color: #f56c6c; }

    .content-card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      transition: background-color 0.3s;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .severity-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .severity-error { background: #fef0f0; color: #f56c6c; }
    .severity-warn { background: #fdf6ec; color: #e6a23c; }
    .severity-info { background: #f4f4f5; color: #909399; }

    html.dark .severity-error { background: #5c2e2e; color: #f89898; }
    html.dark .severity-warn { background: #5e4a2e; color: #f0c78a; }
    html.dark .severity-info { background: #3a3a3a; color: #a0a0a0; }

    .status-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .status-open { background: #fef0f0; color: #f56c6c; }
    .status-resolved { background: #f0f9ff; color: #67c23a; }
    .status-ignored { background: #f4f4f5; color: #909399; }

    html.dark .status-open { background: #5c2e2e; color: #f89898; }
    html.dark .status-resolved { background: #2e4a3a; color: #98f0b0; }
    html.dark .status-ignored { background: #3a3a3a; color: #a0a0a0; }

    .priority-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .priority-critical { background: #fef0f0; color: #f56c6c; }
    .priority-high { background: #fdf6ec; color: #e6a23c; }
    .priority-medium { background: #f4f4f5; color: #909399; }
    .priority-low { background: #f0f9ff; color: #409eff; }

    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #909399;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .event-message {
      max-width: 500px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url-cell {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }

    /* Real-time Events */
    .realtime-events-list {
      max-height: 300px;
      overflow-y: auto;
      background: var(--bg-color);
      border-radius: 4px;
      padding: 8px;
    }

    .live-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #909399;
      transition: background-color 0.3s;
    }

    .live-indicator.active {
      background: #67c23a;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .live-indicator.error {
      background: #f56c6c;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(103, 194, 58, 0.7);
      }
      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 4px rgba(103, 194, 58, 0);
      }
    }

    .realtime-event-item {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.2s;
    }

    .realtime-event-item:last-child {
      border-bottom: none;
    }

    .realtime-event-item:hover {
      background: rgba(0,0,0,0.02);
    }

    html.dark .realtime-event-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .event-time {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: monospace;
    }

    .event-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .type-badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .type-error { background: #fef0f0; color: #f56c6c; }
    .type-performance { background: #f0f9ff; color: #409eff; }
    .type-xhr { background: #f0f9ff; color: #67c23a; }
    .type-info { background: #f4f4f5; color: #909399; }

    html.dark .type-error { background: #5c2e2e; color: #f89898; }
    html.dark .type-performance { background: #2e3a4a; color: #7aa7f0; }
    html.dark .type-xhr { background: #2e4a3a; color: #98f0b0; }
    html.dark .type-info { background: #3a3a3a; color: #a0a0a0; }

    .realtime-event-item .event-message {
      grid-column: 2;
      font-size: 13px;
      color: var(--text-primary);
    }

    .error-state {
      text-align: center;
      padding: 40px 20px;
      color: #f56c6c;
    }

    /* Charts Row */
    .charts-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .charts-row .content-card {
      margin-bottom: 0;
    }

    @media (max-width: 1200px) {
      .charts-row {
        grid-template-columns: 1fr;
      }
    }

    /* Audit Timeline */
    .audit-timeline {
      padding: 20px 0;
    }

    .timeline-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      position: relative;
    }

    .timeline-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 20px;
      top: 48px;
      bottom: -20px;
      width: 2px;
      background: var(--border-color);
    }

    .timeline-avatar {
      flex-shrink: 0;
    }

    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
    }

    .timeline-content {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .timeline-content:hover {
      background: var(--card-bg);
    }

    .timeline-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .timeline-action {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .action-create { background: #e3f9e5; color: #67c23a; }
    .action-update { background: #e3f0ff; color: #409eff; }
    .action-delete { background: #fee; color: #f56c6c; }
    .action-login { background: #fff3e0; color: #e6a23c; }
    .action-logout { background: #f4f4f5; color: #909399; }

    html.dark .action-create { background: #2e4a3a; color: #98f0b0; }
    html.dark .action-update { background: #2e3a4a; color: #7aa7f0; }
    html.dark .action-delete { background: #4a2e2e; color: #f09898; }
    html.dark .action-login { background: #4a3a2e; color: #f0c78a; }
    html.dark .action-logout { background: #3a3a3a; color: #a0a0a0; }

    .timeline-user {
      font-weight: 500;
      color: var(--text-primary);
    }

    .timeline-resource {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .timeline-time {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: monospace;
    }

    .timeline-detail {
      color: var(--text-primary);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .timeline-meta {
      display: flex;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }

      .sidebar-header {
        justify-content: center;
      }

      .logo span {
        display: none;
      }

      .nav-item span {
        display: none;
      }

      .nav-item-icon {
        margin-right: 0;
      }

      .main-content {
        margin-left: 60px;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }

      .filter-bar {
        flex-direction: column;
      }

      .filter-bar > * {
        width: 100% !important;
      }
    }

    /* Sessions Page Styles */
    .pulse-node {
      animation: pulse-error 2s infinite;
    }

    @keyframes pulse-error {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>

  <!-- Element Plus -->
  <script src="https://unpkg.com/element-plus@2.8.7/dist/index.full.min.js"></script>

  <!-- Element Plus Icons -->
  <script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>

  <!-- Chart.js -->
  <script src="https://unpkg.com/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Day.js -->
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://unpkg.com/dayjs@1.11.10/plugin/relativeTime.js"></script>

  <script>
    dayjs.extend(dayjs_plugin_relativeTime);

    const { createApp, ref, reactive, computed, onMounted, watch } = Vue;
    const { ElMessage, ElNotification, ElMessageBox } = ElementPlus;

    // Store for global state
    const store = reactive({
      token: localStorage.getItem('token') || '',
      user: JSON.parse(localStorage.getItem('user') || 'null'),
      currentProject: JSON.parse(localStorage.getItem('currentProject') || 'null'),
      projects: [],

      setToken(token) {
        this.token = token;
        localStorage.setItem('token', token);
      },

      setUser(user) {
        this.user = user;
        localStorage.setItem('user', JSON.stringify(user));
      },

      setCurrentProject(project) {
        this.currentProject = project;
        localStorage.setItem('currentProject', JSON.stringify(project));
      },

      logout() {
        this.token = '';
        this.user = null;
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        localStorage.removeItem('currentProject');
      },

      isAuthenticated() {
        return !!this.token;
      }
    });

    // API helper function
    async function apiCall(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };

      if (store.token) {
        headers['Authorization'] = `Bearer ${store.token}`;
      }

      const config = {
        ...options,
        headers: new Headers(headers)
      };

      try {
        const response = await fetch(url, config);

        if (response.status === 401) {
          store.logout();
          window.location.reload();
          throw new Error('Unauthorized');
        }

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.message || 'API request failed');
        }

        return data;
      } catch (error) {
        if (error.message !== 'Unauthorized') {
          ElNotification({
            title: 'API Error',
            message: error.message,
            type: 'error'
          });
        }
        throw error;
      }
    }

    // Login Component
    const LoginPage = {
      template: `
        <div class="login-container">
          <div class="login-box">
            <div class="login-title">
              <svg style="width:48px;height:48px;color:#409EFF;margin-bottom:16px" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5L19 8v8l-7 3.5L5 16V8l7-3.5zM11 7h2v6h-2V7zm0 8h2v2h-2v-2z"/>
              </svg>
              <div>LogMonitor</div>
            </div>
            <el-form :model="form" :rules="rules" ref="formRef" @submit.prevent="handleLogin">
              <el-form-item prop="username">
                <el-input v-model="form.username" placeholder="Username" prefix-icon="User" size="large" />
              </el-form-item>
              <el-form-item prop="password">
                <el-input v-model="form.password" type="password" placeholder="Password" prefix-icon="Lock" size="large" show-password />
              </el-form-item>
              <el-button type="primary" native-type="submit" :loading="loading" size="large" style="width:100%">
                Sign In
              </el-button>
            </el-form>
          </div>
        </div>
      `,
      setup() {
        const formRef = ref();
        const loading = ref(false);
        const form = reactive({
          username: '',
          password: ''
        });

        const rules = {
          username: [{ required: true, message: 'Please enter username', trigger: 'blur' }],
          password: [{ required: true, message: 'Please enter password', trigger: 'blur' }]
        };

        const handleLogin = async () => {
          try {
            await formRef.value.validate();
            loading.value = true;

            const data = await apiCall('/api/auth/login', {
              method: 'POST',
              body: JSON.stringify({
                username: form.username,
                password: form.password
              })
            });

            store.setToken(data.token);
            store.setUser(data.user);

            ElNotification({
              title: 'Login Successful',
              message: `Welcome back, ${data.user.username}!`,
              type: 'success'
            });

            // Reload to enter dashboard
            setTimeout(() => window.location.reload(), 500);
          } catch (error) {
            // Error already handled by apiCall
          } finally {
            loading.value = false;
          }
        };

        return { formRef, form, rules, loading, handleLogin };
      }
    };

    // Dashboard Overview Component
    const DashboardOverview = {
      template: `
        <div>
          <div class="stat-grid">
            <div class="stat-card">
              <div class="stat-title">Today's Events</div>
              <div class="stat-value">{{ stats.todayEvents || 0 }}</div>
              <div class="stat-trend">{{ stats.totalEvents || 0 }} total events</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">Unresolved Issues</div>
              <div class="stat-value">{{ stats.unresolvedIssues || 0 }}</div>
              <div class="stat-trend" :class="stats.issuesTrend > 0 ? 'trend-up' : 'trend-down'">
                {{ stats.issuesTrend > 0 ? '+' : '' }}{{ stats.issuesTrend || 0 }} from yesterday
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-title">Active Alerts</div>
              <div class="stat-value">{{ stats.activeAlerts || 0 }}</div>
              <div class="stat-trend">Monitoring {{ store.projects?.length || 0 }} projects</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">Error Rate (24h)</div>
              <div class="stat-value">{{ (stats.errorRate || 0).toFixed(2) }}%</div>
              <div class="stat-trend" :class="stats.errorRateTrend < 0 ? 'trend-up' : 'trend-down'">
                {{ stats.errorRateTrend < 0 ? '↓' : '↑' }} {{ Math.abs(stats.errorRateTrend || 0).toFixed(1) }}%
              </div>
            </div>
          </div>

          <!-- Real-time Events Panel -->
          <div class="content-card">
            <div class="card-header">
              <div style="display:flex;align-items:center;gap:10px">
                <span class="card-title">Real-time Events</span>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#909399">
                  <span class="live-indicator" :class="{ active: isLive, error: connectionError }"></span>

            <div class="realtime-events-list" v-loading="loading && realtimeEvents.length === 0" element-loading-text="Loading events...">

              <span class="card-title">Recent Events</span>
              <el-button size="small" @click="$emit('navigate', 'events')">View All</el-button>

      setup() {
        const loading = ref(false);
        const stats = reactive({
          todayEvents: 0,
          totalEvents: 0,
          unresolvedIssues: 0,
          issuesTrend: 0,
          activeAlerts: 0,
          errorRate: 0,
          errorRateTrend: 0
        });
        const recentEvents = ref([]);
        const realtimeEvents = ref([]);
        const isLive = ref(false);
        const connectionError = ref(false);
        let pollingTimer = null;

        const loadData = async () => {
          if (!store.currentProject) return;

          loading.value = true;
          try {
            const appId = store.currentProject.name;
            const now = dayjs();
            const todayStart = now.startOf('day').valueOf();
            const yesterdayStart = now.subtract(1, 'day').startOf('day').valueOf();

            // Get stats
            const statsData = await apiCall(`/api/query/stats?appId=${encodeURIComponent(appId)}`);
            stats.totalEvents = statsData.totalEvents || 0;
            stats.errorCount = statsData.errorCount || 0;
            stats.warnCount = statsData.warnCount || 0;
            stats.infoCount = statsData.infoCount || 0;
            stats.todayEvents = statsData.totalEvents || 0;
            stats.errorRate = statsData.totalEvents > 0
              ? (statsData.errorCount / statsData.totalEvents * 100)
              : 0;

            // Get recent events
            const eventsData = await apiCall(
              `/api/query/logs?appId=${encodeURIComponent(appId)}&pageSize=10&page=1`
            );
            recentEvents.value = (eventsData.data || []).map(e => ({
              timestamp: e.timestamp || e.created_at,
              type: e.type || 'error',
              level: e.level || 'error',
              message: e.message || 'Unknown error'
            }));

            // Get issue stats
            try {
              const issueStats = await apiCall(`/api/query/issues/stats?app_id=${encodeURIComponent(appId)}`);
              stats.unresolvedIssues = (issueStats.open_count || 0) + (issueStats.ignored_count || 0);
            } catch (e) {
              // Issue stats might not be available
            }

            // Get alerts
            try {
              const alertsData = await apiCall(`/api/query/alerts?app_id=${encodeURIComponent(appId)}`);
              stats.activeAlerts = (alertsData.data || alertsData || []).filter(a => a.enabled || a.enabled !== 0).length;
            } catch (e) {
              // Alerts might not be available
            }
          } catch (error) {
            // Error handled by apiCall
          } finally {
            loading.value = false;
          }
        };

        // Real-time events polling
        const loadRealtimeEvents = async () => {
          if (!store.currentProject) return;

          try {
            const appId = store.currentProject.name;
            const eventsData = await apiCall(`/api/query/logs?appId=${encodeURIComponent(appId)}&pageSize=20&page=1`, {
              silent: true  // Don't show error notifications
            });

            const newEvents = (eventsData.data || []).map(e => ({
              id: e.id || `${e.timestamp}_${Math.random()}`,
              timestamp: e.timestamp || e.created_at,
              type: e.type || 'error',
              level: e.level || 'error',
              message: e.message || 'Unknown error'
            }));

            // Check if we have new events (by comparing first event)
            const hasNew = newEvents.length > 0 &&
              (realtimeEvents.value.length === 0 ||
               newEvents[0].timestamp !== realtimeEvents.value[0].timestamp);

            realtimeEvents.value = newEvents;
            connectionError.value = false;
            isLive.value = true;

            // Auto-scroll to top if new events arrived
            if (hasNew) {
              const container = document.querySelector('.realtime-events-list');
              if (container) {
                container.scrollTop = 0;
              }
            }
          } catch (error) {
            connectionError.value = true;
            isLive.value = false;
          }
        };

        const truncateMessage = (msg) => {
          if (!msg) return '';
          return msg.length > 80 ? msg.substring(0, 80) + '...' : msg;
        };

        const startPolling = () => {
          // Load immediately
          loadRealtimeEvents();
          // Then poll every 5 seconds
          pollingTimer = setInterval(() => {
            loadRealtimeEvents();
          }, 5000);
        };

        const stopPolling = () => {
          if (pollingTimer) {
            clearInterval(pollingTimer);
            pollingTimer = null;
          }
        };

        onMounted(() => {
          loadData();
          startPolling();
        });

        onUnmounted(() => {
          stopPolling();
        });

        return { loading, stats, recentEvents, realtimeEvents, isLive, connectionError, truncateMessage, store };
      }

          pageSize: 50

        const pagination = reactive({
          page: 1,

        const loadData = async () => {
          if (!store.currentProject) return;

          loading.value = true;
          try {
            const params = new URLSearchParams({

            if (filters.keyword) params.append('keyword', filters.keyword);
            if (filters.type) params.append('type', filters.type);

              export: 'true'

            if (filters.keyword) params.append('keyword', filters.keyword);
            if (filters.type) params.append('type', filters.type);

            const response = await fetch(`/api/query/export?${params.toString()}`, {
              headers: { Authorization: `Bearer ${store.token}` }
            });

            if (response.ok) {
              const blob = await response.blob();
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');

                  <el-table-column prop="last_seen" label="Last Seen" width="160">
                    <template #default="{ row }">
                      {{ dayjs(row.last_seen).fromNow() }}
                    </template>
                  </el-table-column>
                  <el-table-column label="Actions" width="100">
                    <template #default="{ row }">
                      <el-button size="small" @click="viewCluster(row)">View</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </div>
            </el-tab-pane>
          </el-tabs>

          <!-- Rule Create/Edit Dialog -->
          <el-dialog v-model="showRuleDialog" :title="editingRule ? 'Edit Rule' : 'Create Rule'" width="600px">
            <el-form :model="ruleForm" label-width="120px">
              <el-form-item label="Name">
                <el-input v-model="ruleForm.name" placeholder="Rule name" />
              </el-form-item>
              <el-form-item label="Condition Type">
                <el-select v-model="ruleForm.condition.type" style="width:100%">
                  <el-option label="Threshold" value="threshold" />
                  <el-option label="Trend" value="trend" />
                  <el-option label="Missing" value="missing" />
                </el-select>
              </el-form-item>
              <el-form-item label="Metric" v-if="ruleForm.condition.type === 'threshold' || ruleForm.condition.type === 'trend'">
                <el-select v-model="ruleForm.condition.metric" style="width:100%">
                  <el-option label="Error Count" value="error_count" />
                  <el-option label="Error Rate" value="error_rate" />
                  <el-option label="Event Count" value="event_count" />
                  <el-option label="Page Load" value="page_load" />
                </el-select>
              </el-form-item>
              <el-form-item label="Operator" v-if="ruleForm.condition.type === 'threshold'">
                <el-select v-model="ruleForm.condition.operator" style="width:100%">
                  <el-option label="Greater than (>)" value=">" />
                  <el-option label="Greater or equal (>=)" value=">=" />
                  <el-option label="Less than (<)" value="<" />
                  <el-option label="Less or equal (<=)" value="<=" />
                  <el-option label="Equal (=)" value="==" />
                </el-select>
              </el-form-item>
              <el-form-item label="Threshold Value" v-if="ruleForm.condition.type === 'threshold'">
                <el-input-number v-model="ruleForm.condition.value" :min="0" :step="0.01" />
              </el-form-item>
              <el-form-item label="Window (minutes)">
                <el-input-number v-model="ruleForm.condition.windowMin" :min="1" :max="1440" />
              </el-form-item>
              <el-form-item label="Trend Direction" v-if="ruleForm.condition.type === 'trend'">
                <el-select v-model="ruleForm.condition.trendDir" style="width:100%">
                  <el-option label="Up" value="up" />
                  <el-option label="Down" value="down" />
                </el-select>
              </el-form-item>
              <el-form-item label="Consecutive Times" v-if="ruleForm.condition.type === 'trend'">
                <el-input-number v-model="ruleForm.condition.trendCount" :min="2" :max="10" />
              </el-form-item>
              <el-form-item label="Severity">
                <el-select v-model="ruleForm.severity" style="width:100%">
                  <el-option label="Critical" value="critical" />
                  <el-option label="Warning" value="warning" />
                  <el-option label="Info" value="info" />
                </el-select>
              </el-form-item>
              <el-form-item label="Cooldown (minutes)">
                <el-input-number v-model="ruleForm.cooldownMinutes" :min="1" :max="10080" />
              </el-form-item>
              <el-form-item label="Enabled">
                <el-switch v-model="ruleForm.enabled" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="showRuleDialog = false">Cancel</el-button>
              <el-button type="primary" @click="saveRule" :loading="savingRule">
                {{ editingRule ? 'Update' : 'Create' }}
              </el-button>
            </template>
          </el-dialog>

          <!-- Channel Create/Edit Dialog -->
          <el-dialog v-model="showChannelDialog" :title="editingChannel ? 'Edit Channel' : 'Add Channel'" width="500px">
            <el-form :model="channelForm" label-width="120px">
              <el-form-item label="Name">
                <el-input v-model="channelForm.name" placeholder="Channel name" />
              </el-form-item>
              <el-form-item label="Type">
                <el-select v-model="channelForm.type" style="width:100%">
                  <el-option label="Feishu" value="feishu" />
                  <el-option label="WeCom" value="wecom" />
                  <el-option label="DingTalk" value="dingtalk" />
                  <el-option label="Telegram" value="telegram" />
                  <el-option label="Webhook" value="webhook" />
                  <el-option label="Email" value="email" />
                </el-select>
              </el-form-item>
              <el-form-item label="Webhook URL" v-if="['feishu', 'wecom', 'dingtalk', 'webhook'].includes(channelForm.type)">
                <el-input v-model="channelForm.config.url" placeholder="https://..." />
              </el-form-item>
              <el-form-item label="Bot Token" v-if="channelForm.type === 'telegram'">
                <el-input v-model="channelForm.config.bot_token" placeholder="Telegram bot token" />
              </el-form-item>
              <el-form-item label="Chat ID" v-if="channelForm.type === 'telegram'">
                <el-input v-model="channelForm.config.chat_id" placeholder="Telegram chat ID" />
              </el-form-item>
              <el-form-item label="Email" v-if="channelForm.type === 'email'">
                <el-input v-model="channelForm.config.email" placeholder="recipient@example.com" />
              </el-form-item>
              <el-form-item label="Enabled">
                <el-switch v-model="channelForm.enabled" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="showChannelDialog = false">Cancel</el-button>
              <el-button type="primary" @click="saveChannel" :loading="savingChannel">Save</el-button>
            </template>
          </el-dialog>

          <!-- Cluster Detail Dialog -->
          <el-dialog v-model="showClusterDetail" title="Cluster Details" width="800px">
            <el-descriptions :column="2" border>
              <el-descriptions-item label="Fingerprint">{{ selectedCluster.fingerprint }}</el-descriptions-item>
              <el-descriptions-item label="Severity">
                <el-tag :type="getSeverityType(selectedCluster.severity)">
                  {{ selectedCluster.severity?.toUpperCase() }}
                </el-tag>
              </el-descriptions-item>
              <el-descriptions-item label="Count">{{ selectedCluster.count }}</el-descriptions-item>
              <el-descriptions-item label="Unique Users">{{ selectedCluster.unique_users }}</el-descriptions-item>
              <el-descriptions-item label="First Seen">{{ dayjs(selectedCluster.first_seen).format('YYYY-MM-DD HH:mm:ss') }}</el-descriptions-item>
              <el-descriptions-item label="Last Seen">{{ dayjs(selectedCluster.last_seen).format('YYYY-MM-DD HH:mm:ss') }}</el-descriptions-item>
            </el-descriptions>
            <el-divider>Sample Events</el-divider>
            <el-table :data="clusterEvents" v-loading="clusterEventsLoading" stripe max-height="400">
              <el-table-column prop="message" label="Message" min-width="300" />
              <el-table-column prop="url" label="URL" width="200" />
              <el-table-column prop="created_at" label="Time" width="160">
                <template #default="{ row }">
                  {{ dayjs(row.created_at).format('YYYY-MM-DD HH:mm:ss') }}
                </template>
              </el-table-column>
            </el-table>
          </el-dialog>
        </div>
      `,
      setup() {
        const activeTab = ref('rules');
        const rulesLoading = ref(false);
        const channelsLoading = ref(false);
        const clustersLoading = ref(false);
        const clusterEventsLoading = ref(false);
        const rules = ref([]);
        const channels = ref([]);
        const clusters = ref([]);
        const clusterEvents = ref([]);

        const showRuleDialog = ref(false);
        const showChannelDialog = ref(false);
        const showClusterDetail = ref(false);
        const editingRule = ref(null);
        const editingChannel = ref(null);
        const savingRule = ref(false);
        const savingChannel = ref(false);
        const selectedCluster = ref({});

        const ruleForm = reactive({
          name: '',
          condition: {
            type: 'threshold',
            metric: 'error_count',
            operator: '>=',
            value: 10,
            windowMin: 5,
            trendDir: 'up',
            trendCount: 3
          },
          severity: 'warning',
          cooldownMinutes: 30,
          enabled: true,
          channels: []
        });

        const channelForm = reactive({
          name: '',
          type: 'webhook',
          config: {},
          enabled: true
        });

        const loadRules = async () => {
          if (!store.currentProject) return;
          rulesLoading.value = true;
          try {
            const data = await apiCall('/api/alerts/rules');
            const allRules = data.rules || data || [];
            rules.value = allRules.filter(r => r.app_id === store.currentProject.name);
          } catch (error) {
            rules.value = [];
          } finally {
            rulesLoading.value = false;
          }
        };

        const loadChannels = async () => {
          channelsLoading.value = true;
          try {
            const data = await apiCall('/api/alerts/channels');
            channels.value = data.channels || data || [];
          } catch (error) {
            channels.value = [];
          } finally {
            channelsLoading.value = false;
          }
        };

        const loadClusters = async () => {
          if (!store.currentProject) return;
          clustersLoading.value = true;
          try {
            const data = await apiCall(`/api/alerts/clusters?appId=${encodeURIComponent(store.currentProject.name)}&limit=20`);
            clusters.value = data.clusters || data || [];
          } catch (error) {
            clusters.value = [];
          } finally {
            clustersLoading.value = false;
          }
        };

        const formatConditionType = (type) => {
          const types = { threshold: 'Threshold', trend: 'Trend', missing: 'Missing' };
          return types[type] || type;
        };

        const formatConditionDetail = (row) => {
          const c = row.condition || {};
          if (c.type === 'threshold') {
            return `${c.metric || ''} ${c.operator || ''} ${c.value || 0}`;
          } else if (c.type === 'trend') {
            return `${c.metric || ''} ${c.trendDir || ''} x${c.trendCount || 3}`;
          } else if (c.type === 'missing') {
            return `No ${c.metric || 'events'} for ${c.windowMin || 5}m`;
          }
          return row.condition_config || '';
        };

        const getSeverityType = (severity) => {
          const types = { critical: 'danger', warning: 'warning', info: 'info' };
          return types[severity] || 'info';
        };

        const getChannelTypeName = (type) => {
          const names = {
            feishu: 'Feishu', wecom: 'WeCom', dingtalk: 'DingTalk',
            telegram: 'Telegram', webhook: 'Webhook', email: 'Email'
          };
          return names[type] || type;
        };

        const maskSensitiveConfig = (config) => {
          if (!config) return '';
          const keys = Object.keys(config);
          if (keys.length === 0) return 'No config';
          return keys.map(k => k === 'url' ? config.url : '***').join(', ');
        };

        const toggleRule = async (row) => {
          try {
            const newEnabled = !(row.enabled ?? (row.enabled !== 0));
            await apiCall(`/api/alerts/rules/${row.id}`, {
              method: 'PUT',
              body: JSON.stringify({ enabled: newEnabled })
            });
            row.enabled = newEnabled;
          } catch (error) {
            // Error handled by apiCall
          }
        };

        const editRule = (row) => {
          editingRule.value = row;
          Object.assign(ruleForm, {
            name: row.name,
            condition: row.condition || { type: 'threshold', metric: 'error_count', operator: '>=', value: 10, windowMin: 5 },
            severity: row.severity || 'warning',
            cooldownMinutes: row.cooldown_minutes || 30,
            enabled: row.enabled ?? (row.enabled !== 0),
            channels: row.channels || []
          });
          showRuleDialog.value = true;
        };

        const deleteRule = async (row) => {
          try {
            await ElMessageBox.confirm('Delete this rule?', 'Confirm', { type: 'warning' });
            await apiCall(`/api/alerts/rules/${row.id}`, { method: 'DELETE' });
            ElNotification({ title: 'Rule Deleted', type: 'success' });
            loadRules();
          } catch (error) {
            if (error !== 'cancel') {
              // Error handled by apiCall
            }
          }
        };

        const saveRule = async () => {
          if (!ruleForm.name) {
            ElMessage.warning('Please enter rule name');
            return;
          }
          savingRule.value = true;
          try {
            if (editingRule.value) {
              await apiCall(`/api/alerts/rules/${editingRule.value.id}`, {
                method: 'PUT',
                body: JSON.stringify(ruleForm)
              });
            } else {
              await apiCall('/api/alerts/rules', {
                method: 'POST',
                body: JSON.stringify({
                  app_id: store.currentProject.name,
                  ...ruleForm
                })
              });
            }
            ElNotification({ title: 'Rule Saved', type: 'success' });
            showRuleDialog.value = false;
            editingRule.value = null;
            resetRuleForm();
            loadRules();
          } catch (error) {
            // Error handled by apiCall
          } finally {
            savingRule.value = false;
          }
        };

        const resetRuleForm = () => {
          Object.assign(ruleForm, {
            name: '',
            condition: { type: 'threshold', metric: 'error_count', operator: '>=', value: 10, windowMin: 5 },
            severity: 'warning',
            cooldownMinutes: 30,
            enabled: true,
            channels: []
          });
        };

        const toggleChannel = async (row) => {
          try {
            const newEnabled = !row.enabled;
            await apiCall(`/api/alerts/channels/${row.id}`, {
              method: 'PUT',
              body: JSON.stringify({ enabled: newEnabled })
            });
            row.enabled = newEnabled;
          } catch (error) {
            // Error handled by apiCall
          }
        };

        const editChannel = (row) => {
          editingChannel.value = row;
          Object.assign(channelForm, {
            name: row.name,
            type: row.type,
            config: row.config || {},
            enabled: row.enabled
          });
          showChannelDialog.value = true;
        };

        const saveChannel = async () => {
          if (!channelForm.name) {
            ElMessage.warning('Please enter channel name');
            return;
          }
          savingChannel.value = true;
          try {
            if (editingChannel.value) {
              await apiCall(`/api/alerts/channels/${editingChannel.value.id}`, {
                method: 'PUT',
                body: JSON.stringify(channelForm)
              });
            } else {
              await apiCall('/api/alerts/channels', {
                method: 'POST',
                body: JSON.stringify(channelForm)
              });
            }
            ElNotification({ title: 'Channel Saved', type: 'success' });
            showChannelDialog.value = false;
            editingChannel.value = null;
            resetChannelForm();
            loadChannels();
          } catch (error) {
            // Error handled by apiCall
          } finally {
            savingChannel.value = false;
          }
        };

        const resetChannelForm = () => {
          Object.assign(channelForm, { name: '', type: 'webhook', config: {}, enabled: true });
        };

        const testChannel = async (row) => {
          try {
            await apiCall('/api/alerts/test', {
              method: 'POST',
              body: JSON.stringify({ channel_id: row.id })
            });
            ElNotification({ title: 'Test Notification Sent', type: 'success' });
          } catch (error) {
            // Error handled by apiCall
          }
        };

        const deleteChannel = async (row) => {
          try {
            await ElMessageBox.confirm('Delete this channel?', 'Confirm', { type: 'warning' });
            await apiCall(`/api/alerts/channels/${row.id}`, { method: 'DELETE' });
            ElNotification({ title: 'Channel Deleted', type: 'success' });
            loadChannels();
          } catch (error) {
            if (error !== 'cancel') {
              // Error handled by apiCall
            }
          }
        };

        const viewCluster = async (row) => {
          selectedCluster.value = row;
          showClusterDetail.value = true;
          clusterEventsLoading.value = true;
          try {
            const data = await apiCall(`/api/alerts/clusters/${row.fingerprint}?appId=${encodeURIComponent(store.currentProject.name)}&pageSize=20`);
            clusterEvents.value = data.events?.data || data || [];
          } catch (error) {
            clusterEvents.value = [];
          } finally {
            clusterEventsLoading.value = false;
          }
        };

        watch(activeTab, (tab) => {
          if (tab === 'rules') loadRules();
          if (tab === 'channels') loadChannels();
          if (tab === 'clusters') loadClusters();
        });

        onMounted(() => {
          loadRules();
        });

        return {
          activeTab, rulesLoading, channelsLoading, clustersLoading, clusterEventsLoading,
          rules, channels, clusters, clusterEvents,
          showRuleDialog, showChannelDialog, showClusterDetail,
          editingRule, editingChannel, savingRule, savingChannel,
          ruleForm, channelForm, selectedCluster,
          formatConditionType, formatConditionDetail,
          getSeverityType, getChannelTypeName, maskSensitiveConfig,
          toggleRule, editRule, deleteRule, saveRule,
          toggleChannel, editChannel, saveChannel, testChannel, deleteChannel,
          loadClusters, viewCluster
        };
      }
    };

    // Performance Page Component
    const PerformancePage = {
      template: `
        <div>
          <div class="stat-grid">
            <div class="stat-card">
              <div class="stat-title">FCP (P75)</div>
              <div class="stat-value">{{ formatMs(performance.fcp_p75 || 0) }}</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">LCP (P75)</div>
              <div class="stat-value">{{ formatMs(performance.lcp_p75 || 0) }}</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">CLS (P75)</div>
              <div class="stat-value">{{ (performance.cls_p75 || 0).toFixed(3) }}</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">INP (P75)</div>
              <div class="stat-value">{{ formatMs(performance.inp_p75 || 0) }}</div>
            </div>
          </div>

          <div class="charts-row">
            <div class="content-card">
              <div class="card-header">
                <span class="card-title">FCP Trend (7 days)</span>
              </div>
              <div class="chart-container">
                <canvas ref="fcpChart"></canvas>
              </div>
            </div>

            <div class="content-card">
              <div class="card-header">
                <span class="card-title">LCP Trend (7 days)</span>
              </div>
              <div class="chart-container">
                <canvas ref="lcpChart"></canvas>
              </div>
            </div>

            <div class="content-card">
              <div class="card-header">
                <span class="card-title">CLS Trend (7 days)</span>
              </div>
              <div class="chart-container">
                <canvas ref="clsChart"></canvas>
              </div>
            </div>
          </div>

          <div class="content-card">
            <div class="card-header">
              <span class="card-title">Page Performance</span>
            </div>
            <el-table :data="pages" v-loading="loading" stripe size="small">
              <el-table-column prop="url" label="URL" min-width="300">
                <template #default="{ row }">
                  {{ formatUrl(row.url) }}
                </template>
              </el-table-column>
              <el-table-column prop="fcp_p75" label="FCP" width="80">
                <template #default="{ row }">{{ formatMs(row.fcp_p75 || 0) }}</template>
              </el-table-column>
              <el-table-column prop="lcp_p75" label="LCP" width="80">
                <template #default="{ row }">{{ formatMs(row.lcp_p75 || 0) }}</template>
              </el-table-column>
              <el-table-column prop="cls_p75" label="CLS" width="80">
                <template #default="{ row }">{{ (row.cls_p75 || 0).toFixed(3) }}</template>
              </el-table-column>
              <el-table-column prop="inp_p75" label="INP" width="80">
                <template #default="{ row }">{{ formatMs(row.inp_p75 || 0) }}</template>
              </el-table-column>
              <el-table-column prop="sample_count" label="Samples" width="80" />
            </el-table>
          </div>
        </div>
      `,
      setup() {
        const loading = ref(false);
        const performance = reactive({
          fcp_p75: 0,
          lcp_p75: 0,
          cls_p75: 0,
          inp_p75: 0
        });
        const pages = ref([]);
        const fcpChart = ref(null);
        const lcpChart = ref(null);
        const clsChart = ref(null);
        let fcpChartInstance = null;
        let lcpChartInstance = null;
        let clsChartInstance = null;

        const formatMs = (val) => {
          if (val < 1000) return `${val.toFixed(0)}ms`;
          return `${(val / 1000).toFixed(2)}s`;
        };

        const formatUrl = (url) => {
          try {
            const u = new URL(url);
            return u.pathname + u.search;
          } catch {
            return url;
          }
        };

        // Generate mock 7-day trend data for a metric
        const generateTrendData = (baseValue, variance, isScore = false) => {
          const now = Date.now();
          const data = [];
          for (let i = 6; i >= 0; i--) {
            const date = now - i * 24 * 60 * 60 * 1000;
            const randomFactor = (Math.random() - 0.5) * variance;
            let value = baseValue + randomFactor;
            if (isScore) {
              value = Math.max(0, Math.min(1, value));
            } else {
              value = Math.max(0, value);
            }
            data.push({ date, value });
          }
          return data;
        };

        // Fetch or generate trend data for a specific metric
        const getTrendData = async (metric) => {
          try {
            const trend = await apiCall(`/api/query/performance/trend?app_id=${encodeURIComponent(store.currentProject.name)}&metric=${metric}&period=7d`);
            return trend.data || trend || [];
          } catch (e) {
            // Generate mock data based on metric type
            switch (metric) {
              case 'fcp':
                return generateTrendData(1200, 400); // ~1.2s ± 400ms
              case 'lcp':
                return generateTrendData(2000, 600); // ~2s ± 600ms
              case 'cls':
                return generateTrendData(0.1, 0.15, true); // ~0.1 ± 0.15
              default:
                return generateTrendData(1000, 300);
            }
          }
        };

        // Render a chart
        const renderChart = (canvasRef, chartInstance, data, label, color, unit) => {
          if (!canvasRef.value) return;
          if (chartInstance) chartInstance.destroy();

          const ctx = canvasRef.value.getContext('2d');
          const newInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: data.map(d => dayjs(d.date).format('MM-DD')),
              datasets: [{
                label: `${label} (${unit})`,
                data: data.map(d => d.value || d.p75 || 0),
                borderColor: color,
                backgroundColor: color.replace('1)', '0.1)').replace('rgb', 'rgba').replace(')', ', 0.1)'),
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: true,
                  position: 'top',
                  labels: { color: '#909399' }
                },
                tooltip: {
                  callbacks: {
                    label: (context) => {
                      const value = context.parsed.y;
                      if (unit === 'score') {
                        return `${label}: ${value.toFixed(3)}`;
                      }
                      if (value >= 1000) {
                        return `${label}: ${(value / 1000).toFixed(2)}s`;
                      }
                      return `${label}: ${value.toFixed(0)}ms`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  ticks: { color: '#909399' },
                  grid: { color: 'rgba(144, 147, 153, 0.1)' }
                },
                y: {
                  beginAtZero: true,
                  ticks: {
                    color: '#909399',
                    callback: (v) => {
                      if (unit === 'score') return v.toFixed(2);
                      if (v >= 1000) return (v / 1000).toFixed(1) + 's';
                      return v + 'ms';
                    }
                  },
                  grid: { color: 'rgba(144, 147, 153, 0.1)' }
                }
              }
            }
          });
          return newInstance;
        };

        const loadData = async () => {
          if (!store.currentProject) return;

          loading.value = true;
          try {
            // Get performance summary
            try {
              const summary = await apiCall(`/api/query/performance/summary?app_id=${encodeURIComponent(store.currentProject.name)}`);

                </div>

                <el-table :data="projects" v-loading="loading" stripe>
                  <el-table-column prop="id" label="ID" width="60" />
                  <el-table-column prop="name" label="Name" width="200" />
                  <el-table-column prop="description" label="Description" min-width="200" />
                  <el-table-column prop="api_key" label="API Key" width="300">
                    <template #default="{ row }">
                      <code style="font-size:12px">{{ maskKey(row.api_key) }}</code>
                    </template>
                  </el-table-column>
                  <el-table-column label="Actions" width="180">
                    <template #default="{ row }">
                      <el-button-group size="small">
                        <el-button @click="regenerateKey(row)">Regenerate Key</el-button>
                        <el-button type="danger" @click="deleteProject(row)">Delete</el-button>
                      </el-button-group>
                    </template>
                  </el-table-column>
                </el-table>
              </div>
            </el-tab-pane>

            <el-tab-pane label="API Keys" name="keys">
              <div class="content-card">
                <div class="card-header">
                  <span class="card-title">Project API Keys</span>
                </div>
                <el-table :data="projects" stripe>
                  <el-table-column prop="name" label="Project" width="200" />
                  <el-table-column prop="api_key" label="API Key">
                    <template #default="{ row }">
                      <div style="display:flex;align-items:center;gap:10px">
                        <code style="font-size:12px">{{ maskKey(row.api_key) }}</code>
                        <el-button size="small" @click="copyKey(row.api_key)">Copy</el-button>
                      </div>
                    </template>
                  </el-table-column>
                </el-table>
              </div>
            </el-tab-pane>

            <el-tab-pane label="Members" name="members">
              <div class="content-card">
                <div class="card-header">
                  <span class="card-title">Team Members</span>
                  <el-button type="primary" @click="showAddMember = true">
                    <el-icon><Plus /></el-icon> Add Member
                  </el-button>
                </div>

                <el-table :data="users" v-loading="loadingUsers" stripe>
                  <el-table-column prop="id" label="ID" width="60" />
                  <el-table-column prop="username" label="Username" width="150" />
                  <el-table-column prop="role" label="Role" width="120">
                    <template #default="{ row }">
                      <el-tag :type="row.role === 'admin' ? 'danger' : ''">{{ row.role }}</el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column prop="created_at" label="Created" width="170">
                    <template #default="{ row }">
                      {{ dayjs(row.created_at).format('YYYY-MM-DD HH:mm:ss') }}
                    </template>
                  </el-table-column>
                </el-table>
              </div>
            </el-tab-pane>
          </el-tabs>

          <el-dialog v-model="showCreateProject" title="Create Project" width="500px">
            <el-form :model="projectForm" label-width="100px">
              <el-form-item label="Name">
                <el-input v-model="projectForm.name" placeholder="my-app" />
              </el-form-item>
              <el-form-item label="Description">
                <el-input v-model="projectForm.description" type="textarea" placeholder="Project description" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="showCreateProject = false">Cancel</el-button>
              <el-button type="primary" @click="createProject" :loading="creating">Create</el-button>
            </template>
          </el-dialog>

          <el-dialog v-model="showAddMember" title="Add Member" width="400px">
            <el-form :model="memberForm" label-width="100px">
              <el-form-item label="Username">
                <el-input v-model="memberForm.username" placeholder="username" />
              </el-form-item>
              <el-form-item label="Password">
                <el-input v-model="memberForm.password" type="password" placeholder="password" />
              </el-form-item>
              <el-form-item label="Role">
                <el-select v-model="memberForm.role" style="width:100%">
                  <el-option label="User" value="user" />
                  <el-option label="Admin" value="admin" />
                </el-select>
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="showAddMember = false">Cancel</el-button>
              <el-button type="primary" @click="addMember" :loading="adding">Add</el-button>
            </template>
          </el-dialog>
        </div>
      `,
      setup() {
        const activeTab = ref('projects');
        const loading = ref(false);
        const loadingUsers = ref(false);
        const creating = ref(false);
        const adding = ref(false);
        const projects = ref([]);
        const users = ref([]);
        const showCreateProject = ref(false);
        const showAddMember = ref(false);
        const projectForm = reactive({ name: '', description: '' });
        const memberForm = reactive({ username: '', password: '', role: 'user' });

        const loadProjects = async () => {
          loading.value = true;
          try {
            const data = await apiCall('/api/admin/projects');
            projects.value = data.data || data || [];
          } catch (error) {
            projects.value = [];
          } finally {
            loading.value = false;
          }
        };

        const loadUsers = async () => {
          loadingUsers.value = true;
          try {
            const data = await apiCall('/api/users');
            users.value = data.data || data || [];
          } catch (error) {
            users.value = [];
          } finally {
            loadingUsers.value = false;
          }
        };

        const maskKey = (key) => {
          if (!key) return '-';
          return key.slice(0, 8) + '...' + key.slice(-4);
        };

        const createProject = async () => {
          if (!projectForm.name) {
            ElMessage.warning('Please enter project name');
            return;
          }

          creating.value = true;
          try {
            await apiCall('/api/admin/projects', {
              method: 'POST',
              body: JSON.stringify(projectForm)
            });

            ElNotification({ title: 'Project Created', type: 'success' });
            showCreateProject.value = false;
            projectForm.name = '';
            projectForm.description = '';
            loadProjects();
          } catch (error) {
            // Error handled by apiCall
          } finally {
            creating.value = false;
          }
        };

        const deleteProject = async (project) => {
          try {
            await ElMessageBox.confirm(`Delete project "${project.name}"?`, 'Confirm', {
              type: 'warning'
            });

            await apiCall(`/api/admin/projects/${project.id}`, { method: 'DELETE' });
            ElNotification({ title: 'Project Deleted', type: 'success' });
            loadProjects();
          } catch (error) {
            if (error !== 'cancel') {
              // Error handled by apiCall
            }
          }
        };

        const regenerateKey = async (project) => {
          try {
            await ElMessageBox.confirm(`Regenerate API key for "${project.name}"?`, 'Confirm', {
              type: 'warning'
            });

            const data = await apiCall('/api/admin/projects/api-key', {
              method: 'POST',
              body: JSON.stringify({ project_id: project.id })
            });

            ElMessageBox.alert(data.api_key || data.apiKey, 'New API Key', {
              confirmButtonText: 'Copy',
              callback: () => {
                navigator.clipboard.writeText(data.api_key || data.apiKey);
                ElMessage.success('Copied to clipboard');
              }
            });

            loadProjects();
          } catch (error) {
            if (error !== 'cancel') {
              // Error handled by apiCall
            }
          }
        };

        const copyKey = (key) => {
          navigator.clipboard.writeText(key);
          ElMessage.success('Copied to clipboard');
        };

        const addMember = async () => {
          if (!memberForm.username || !memberForm.password) {
            ElMessage.warning('Please fill all fields');
            return;
          }

          adding.value = true;
          try {
            await apiCall('/api/users', {
              method: 'POST',
              body: JSON.stringify(memberForm)
            });

            ElNotification({ title: 'Member Added', type: 'success' });
            showAddMember.value = false;
            memberForm.username = '';
            memberForm.password = '';
            memberForm.role = 'user';
            loadUsers();
          } catch (error) {
            // Error handled by apiCall
          } finally {
            adding.value = false;
          }
        };

        onMounted(() => {
          loadProjects();
          loadUsers();
        });

        return {
          activeTab, loading, loadingUsers, creating, adding,
          projects, users, showCreateProject, showAddMember,
          projectForm, memberForm, loadProjects, loadUsers,
          maskKey, createProject, deleteProject, regenerateKey, copyKey, addMember
        };
      }
    };

    // Main Dashboard Component
    const Dashboard = {
      components: {
        DashboardOverview,
        EventsPage,
        IssuesPage,
        AlertsPage,
        PerformancePage,
        SessionsPage,
        AuditLogsPage,
        SettingsPage
      },
      template: `
        <div class="dashboard-layout">
          <aside class="sidebar">
            <div class="sidebar-header">
              <div class="logo">
                <div class="logo-icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;color:#fff">
                    <path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/>
                  </svg>
                </div>
                <span>LogMonitor</span>
              </div>
            </div>
            <nav class="nav-menu">
              <a v-for="item in navItems"
                 :key="item.key"
                 :class="['nav-item', { active: currentPage === item.key }]"
                 @click="currentPage = item.key">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path :d="item.icon" />
                </svg>
                <span>{{ item.label }}</span>
              </a>
            </nav>
          </aside>

          <main class="main-content">
            <header class="top-header">
              <div class="header-left">
                <el-dropdown @command="selectProject" trigger="click">
                  <span style="cursor:pointer;display:flex;align-items:center;gap:8px">
                    <el-button type="primary" :icon="FolderOpened">
                      {{ currentProject?.name || 'Select Project' }}
                    </el-button>
                  </span>
                  <template #dropdown>
                    <el-dropdown-menu>
                      <el-dropdown-item v-for="p in projects" :key="p.id" :command="p">
                        {{ p.name }}
                      </el-dropdown-item>
                    </el-dropdown-menu>
                  </template>
                </el-dropdown>
              </div>
              <div class="header-right">
                <div class="theme-toggle" @click="toggleTheme" :title="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
                  <svg v-if="!isDark" viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px">
                    <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                  </svg>
                  <svg v-else viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px">
                    <path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>
                  </svg>
                </div>
                <span class="page-title">{{ currentPageTitle }}</span>
                <el-dropdown @command="handleUserCommand" trigger="click">
                  <div class="user-menu">
                    <div class="user-avatar">{{ user?.username?.charAt(0)?.toUpperCase() || 'U' }}</div>
                    <span>{{ user?.username || 'User' }}</span>
                    <el-icon><ArrowDown /></el-icon>
                  </div>
                  <template #dropdown>
                    <el-dropdown-menu>
                      <el-dropdown-item command="logout">Logout</el-dropdown-item>
                    </el-dropdown-menu>
                  </template>
                </el-dropdown>
              </div>
            </header>

            <div class="content-area" v-if="currentProject">
              <component :is="currentPageComponent" @navigate="navigateTo" />
            </div>
            <div class="empty-state" v-else>
              <div class="empty-icon">📁</div>
              <h3>No Project Selected</h3>
              <p>Please select a project from the dropdown above</p>
            </div>
          </main>
        </div>
      `,
      setup() {
        const currentPage = ref('dashboard');
        const projects = ref([]);
        const user = computed(() => store.user);
        const currentProject = computed(() => store.currentProject);

        const navItems = [
          { key: 'dashboard', label: 'Dashboard', icon: 'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z' },
          { key: 'events', label: 'Events', icon: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z' },
          { key: 'issues', label: 'Issues', icon: 'M12 2L1 21h22L12 2zm0 3.5L19.5 19H4.5L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z' },
          { key: 'alerts', label: 'Alerts', icon: 'M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z' },
          { key: 'performance', label: 'Performance', icon: 'M3.5 18.5l6-6.01 4 4L22 6.92l-1.07-1.05-7.44 7.44-4-4L2 16.44z' },
          { key: 'sessions', label: 'Sessions', icon: 'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z' },
          { key: 'audit', label: 'Audit Logs', icon: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 14H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z' },
          { key: 'settings', label: 'Settings', icon: 'M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z' }
        ];

        const currentPageComponent = computed(() => {
          const map = {
            dashboard: 'DashboardOverview',
            events: 'EventsPage',
            issues: 'IssuesPage',
            alerts: 'AlertsPage',
            performance: 'PerformancePage',
            sessions: 'SessionsPage',
            audit: 'AuditLogsPage',
            settings: 'SettingsPage'
          };
          return map[currentPage.value] || 'DashboardOverview';
        });

        const currentPageTitle = computed(() => {
          const item = navItems.find(i => i.key === currentPage.value);
          return item?.label || 'Dashboard';
        });

        const navigateTo = (page) => {
          currentPage.value = page;
        };

        const loadProjects = async () => {
          try {
            const data = await apiCall('/api/query/apps');
            const apps = data.data || data || [];
            projects.value = apps.map(a => ({ name: a, id: a }));
          } catch (error) {
            projects.value = [];
          }
        };

        const selectProject = (project) => {
          store.setCurrentProject(project);
        };

        const handleUserCommand = (command) => {
          if (command === 'logout') {
            store.logout();
            window.location.reload();
          }
        };

        // Theme toggle
        const isDark = ref(localStorage.getItem('logmonitor-theme') === 'dark');

        const toggleTheme = () => {
          isDark.value = !isDark.value;
          if (isDark.value) {
            document.documentElement.classList.add('dark');
            localStorage.setItem('logmonitor-theme', 'dark');
          } else {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('logmonitor-theme', 'light');
          }
        };

        // Apply theme on mount
        onMounted(() => {
          loadProjects();
          if (isDark.value) {
            document.documentElement.classList.add('dark');
          }
        });

        return {
          currentPage,
          currentPageComponent,
          currentPageTitle,
          navItems,
          isDark,
          toggleTheme,
          projects,
          user,
          currentProject,
          navigateTo,
          selectProject,
          handleUserCommand
        };
      }
    };

    // Root App
    const App = {
      components: { LoginPage, Dashboard },
      template: `
        <LoginPage v-if="!isAuthenticated" />
        <Dashboard v-else />
      `,
      setup() {
        const isAuthenticated = computed(() => store.isAuthenticated());

        // Load user info if authenticated
        onMounted(async () => {
          if (isAuthenticated.value) {
            try {
              const user = await apiCall('/api/auth/me');
              store.setUser(user);
            } catch (error) {
              store.logout();
            }
          }
        });

        return { isAuthenticated };
      }
    };

    // Create and mount app
    const app = createApp(App);
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
